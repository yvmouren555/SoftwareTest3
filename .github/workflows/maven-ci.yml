name: Java Maven 持续集成环境
on:
  push:
    branches: [ main, master ]

jobs:
  ci-full-task:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取项目代码
        uses: actions/checkout@v4

      - name: 配置JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven

      # 配置Maven国内镜像，加速依赖下载
      - name: 配置Maven镜像
        run: |
          mkdir -p ~/.m2
          echo '<settings>
            <mirrors>
              <mirror>
                <id>aliyunmaven</id>
                <mirrorOf>central</mirrorOf>
                <url>https://maven.aliyun.com/repository/public</url>
              </mirror>
            </mirrors>
          </settings>' > ~/.m2/settings.xml

      - name: 执行Maven Test 冒烟测试
        run: mvn clean test

      - name: 执行Maven Build 打包构建
        run: mvn clean package
